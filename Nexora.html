<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexora — Smart. Simple. Essential.</title>
  <meta name="description" content="Nexora makes a single, considered version of the everyday objects you reach for without thinking — so each one earns its place." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" />
  <style>
/* ============================================================
   NEXORA — warm minimalist D2C system
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

:root {
  --accent: #B5764A;            /* set live via Tweaks */
  --font-display: 'Newsreader', Georgia, serif;
  --font-ui: 'Hanken Grotesk', system-ui, sans-serif;
  --maxw: 1280px;
  --pad: clamp(20px, 5vw, 72px);
  --r: 4px;
  --ease: cubic-bezier(.22,.61,.36,1);
}

/* ---- Light (default) ---- */
:root, [data-theme="light"] {
  --bg:        #F3EADC;
  --bg-deep:   #ECDFCB;
  --surface:   #FBF6EE;
  --ink:       #211D16;
  --ink-soft:  #5E5648;
  --ink-faint: #908774;
  --line:      rgba(33,29,22,0.13);
  --line-soft: rgba(33,29,22,0.07);
  --shadow:    0 18px 50px -24px rgba(40,30,15,0.40);
  --shadow-sm: 0 6px 22px -12px rgba(40,30,15,0.30);
  --on-accent: #FBF6EE;
}
/* ---- Dark ---- */
[data-theme="dark"] {
  --bg:        #16130E;
  --bg-deep:   #100D09;
  --surface:   #211C15;
  --ink:       #F3ECDD;
  --ink-soft:  #B7AC97;
  --ink-faint: #7E7461;
  --line:      rgba(243,236,221,0.15);
  --line-soft: rgba(243,236,221,0.07);
  --shadow:    0 24px 60px -24px rgba(0,0,0,0.7);
  --shadow-sm: 0 8px 26px -14px rgba(0,0,0,0.6);
  --on-accent: #16130E;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background .5s var(--ease), color .5s var(--ease);
}
img { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }

.wrap { max-width: var(--maxw); margin: 0 auto; padding-inline: var(--pad); }

/* Type helpers */
.serif { font-family: var(--font-display); font-weight: 400; }
.eyebrow {
  font-size: 12px; font-weight: 600; letter-spacing: .22em;
  text-transform: uppercase; color: var(--ink-faint);
}
.display {
  font-family: var(--font-display); font-weight: 400;
  line-height: 1.02; letter-spacing: -0.015em;
  font-size: clamp(40px, 7vw, 88px);
}
.h2 {
  font-family: var(--font-display); font-weight: 400;
  font-size: clamp(30px, 4.4vw, 56px); line-height: 1.05;
  letter-spacing: -0.01em;
}
.lede { font-size: clamp(17px, 1.4vw, 20px); color: var(--ink-soft); line-height: 1.6; }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  height: 52px; padding: 0 26px; border-radius: 999px;
  font-weight: 600; font-size: 15px; letter-spacing: .01em;
  transition: transform .25s var(--ease), background .25s var(--ease), color .25s var(--ease), box-shadow .25s var(--ease);
  white-space: nowrap;
}
.btn-primary { background: var(--ink); color: var(--bg); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.btn-accent { background: var(--accent); color: var(--on-accent); }
.btn-accent:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.btn-ghost { border: 1px solid var(--line); color: var(--ink); }
.btn-ghost:hover { background: var(--surface); }
.btn-sm { height: 42px; padding: 0 18px; font-size: 14px; }

.divider { height: 1px; background: var(--line); border: 0; }

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  * { transition: none !important; animation: none !important; }
}

/* ============================================================
   NEXORA — component styles
   ============================================================ */

/* ---------------- Header ---------------- */
.nx-head {
  position: fixed; top: 0; left: 0; right: 0; z-index: 80;
  transition: background .4s var(--ease), box-shadow .4s var(--ease), border-color .4s var(--ease);
  border-bottom: 1px solid transparent;
}
.nx-head.solid {
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom-color: var(--line);
}
.nx-head-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
.nx-logo {
  font-family: var(--font-ui); font-weight: 700; font-size: 23px;
  letter-spacing: -0.02em; position: relative; padding-right: 10px;
}
.nx-logo.big { font-size: 30px; }
.nx-logo-dot {
  position: absolute; right: 0; bottom: 6px; width: 7px; height: 7px;
  border-radius: 999px; background: var(--accent);
}
.nx-nav { display: flex; gap: 38px; }
.nx-nav a { font-size: 15px; font-weight: 500; color: var(--ink-soft); transition: color .2s; position: relative; }
.nx-nav a:hover { color: var(--ink); }
.nx-nav a::after { content: ''; position: absolute; left: 0; bottom: -4px; height: 1.5px; width: 0; background: var(--accent); transition: width .25s var(--ease); }
.nx-nav a:hover::after { width: 100%; }
.nx-cart-btn { position: relative; width: 46px; height: 46px; border-radius: 999px; display: grid; place-items: center; font-size: 21px; border: 1px solid var(--line); transition: background .2s, transform .2s; }
.nx-cart-btn:hover { background: var(--surface); transform: translateY(-1px); }
.nx-cart-count { position: absolute; top: -3px; right: -3px; min-width: 20px; height: 20px; padding: 0 5px; border-radius: 999px; background: var(--accent); color: var(--on-accent); font-size: 11px; font-weight: 700; display: grid; place-items: center; }
@media (max-width: 720px) { .nx-nav { display: none; } }

/* ---------------- Hero ---------------- */
.nx-hero { position: relative; padding-top: 72px; }
.nx-hero-grid { display: grid; grid-template-columns: 1.05fr 1fr; align-items: stretch; min-height: 88vh; }
.nx-hero-copy { display: flex; flex-direction: column; justify-content: center; padding: 64px var(--pad) 64px max(var(--pad), calc((100vw - var(--maxw)) / 2 + var(--pad))); }
.nx-hero-eyebrow { color: var(--accent); margin-bottom: 22px; }
.nx-hero .display em.nx-em { font-style: italic; color: var(--accent); }
.nx-hero-lede { max-width: 32ch; margin: 26px 0 0; }
.nx-hero-cta { display: flex; gap: 14px; margin-top: 38px; flex-wrap: wrap; }
.nx-hero-meta { display: flex; gap: 26px; margin-top: 34px; }
.nx-hero-meta span { display: inline-flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--ink-faint); font-weight: 500; }
.nx-hero-meta i { color: var(--accent); font-size: 17px; }
.nx-hero-visual { position: relative; overflow: hidden; background: var(--bg-deep); }
.nx-hero-visual > img { width: 100%; height: 100%; object-fit: cover; object-position: 60% center; }

/* hero product mosaic — all five essentials as stylish tiles */
.nx-hero-tiles {
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr);
  gap: 8px; width: 100%; height: 100%; background: var(--bg-deep);
}
.nx-hero-tile { position: relative; overflow: hidden; margin: 0; background: var(--surface); }
.nx-hero-tile.feature { grid-row: span 2; }
.nx-hero-tile img { width: 100%; height: 100%; object-fit: cover; transition: transform .6s var(--ease); }
.nx-hero-tile:hover img { transform: scale(1.06); }
.nx-hero-tile figcaption {
  position: absolute; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; gap: 1px;
  padding: 16px 14px 13px; color: #fff;
  background: linear-gradient(to top, rgba(20,14,6,.62), rgba(20,14,6,.18) 60%, transparent);
  opacity: 0; transform: translateY(8px); transition: opacity .3s var(--ease), transform .3s var(--ease);
}
.nx-hero-tile:hover figcaption { opacity: 1; transform: translateY(0); }
.nx-hero-tile-name { font-size: 21px; line-height: 1; }
.nx-hero-tile-cat { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; opacity: .88; }
@media (hover: none) { .nx-hero-tile figcaption { opacity: 1; transform: none; } }
.nx-hero-badge {
  position: absolute; left: -1px; bottom: 40px; background: var(--surface);
  padding: 18px 26px 18px 22px; display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow); border-left: 3px solid var(--accent);
}
.nx-hero-badge .serif { font-size: 46px; line-height: 1; color: var(--accent); }
.nx-hero-badge span:last-child { font-size: 13px; line-height: 1.3; color: var(--ink-soft); font-weight: 500; }
.nx-scroll-cue {
  position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
  width: 42px; height: 42px; border-radius: 999px; border: 1px solid var(--line);
  display: grid; place-items: center; background: var(--bg); color: var(--ink-soft);
  animation: nxbob 2.2s var(--ease) infinite;
}
@keyframes nxbob { 0%,100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, 6px); } }
@media (max-width: 900px) {
  .nx-hero-grid { grid-template-columns: 1fr; min-height: auto; }
  .nx-hero-copy { padding: 40px var(--pad) 30px; }
  .nx-hero-visual { min-height: 56vh; }
  .nx-scroll-cue { display: none; }
}
/* Desktop: fit the whole hero (text + all five tiles) on one screen — no scroll.
   Keep the 72px header gap so the tiles start *below* the fixed header (no overlap),
   and size the grid to the remaining viewport so the total hero is exactly 100vh. */
@media (min-width: 901px) {
  .nx-hero { padding-top: 72px; }
  .nx-hero-grid { min-height: calc(100vh - 72px); height: calc(100vh - 72px); }
  .nx-hero-copy { padding-top: 40px; padding-bottom: 40px; }
  .nx-hero .display { font-size: clamp(40px, 4.6vw, 64px); }
  .nx-hero-lede { margin-top: 18px; }
  .nx-hero-cta { margin-top: 26px; }
  .nx-hero-meta { margin-top: 22px; }
}
/* Short desktop viewports: trim type/spacing further so it still never scrolls. */
@media (min-width: 901px) and (max-height: 760px) {
  .nx-hero-copy { padding-top: 28px; padding-bottom: 28px; }
  .nx-hero .display { font-size: clamp(36px, 4vw, 52px); }
  .nx-hero-lede { margin-top: 14px; font-size: 16px; }
  .nx-hero-cta { margin-top: 20px; }
  .nx-hero-meta { margin-top: 18px; }
}

/* ---------------- Showcase ---------------- */
.nx-showcase { padding: clamp(72px, 11vw, 150px) 0 40px; }
.nx-showcase-head { max-width: 760px; margin-bottom: clamp(40px, 6vw, 90px); }
.nx-showcase-head .h2 { margin: 16px 0 22px; }
.nx-showcase-head .eyebrow { color: var(--accent); }
.nx-showcase-list { display: flex; flex-direction: column; gap: clamp(80px, 11vw, 150px); }

.nx-prod { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(36px, 5vw, 84px); align-items: center; }
.nx-prod.rev .nx-prod-visual { order: 2; }
.nx-prod-visual { display: flex; flex-direction: column; gap: 16px; }
.nx-stage {
  position: relative; background: var(--bg-deep); overflow: hidden;
  aspect-ratio: 4 / 3.2; box-shadow: var(--shadow-sm);
}
.nx-stage-img { width: 100%; height: 100%; object-fit: cover; animation: nxfade .5s var(--ease); }
@keyframes nxfade { from { opacity: 0; } to { opacity: 1; } }
.nx-stage-hint {
  position: absolute; left: 16px; bottom: 16px; display: inline-flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 600; letter-spacing: .03em; color: var(--ink);
  background: color-mix(in srgb, var(--surface) 88%, transparent); backdrop-filter: blur(6px);
  padding: 7px 13px; border-radius: 999px; pointer-events: none;
}
.nx-stage-hint i { color: var(--accent); }

/* hotspots */
.nx-hs { position: absolute; transform: translate(-50%, -50%); z-index: 4; }
.nx-hs-dot {
  position: relative; width: 34px; height: 34px; border-radius: 999px;
  background: var(--surface); color: var(--ink); display: grid; place-items: center;
  box-shadow: 0 4px 14px rgba(0,0,0,.22); font-size: 18px; transition: transform .25s var(--ease), background .25s, color .25s;
}
.nx-hs-dot.on { background: var(--accent); color: var(--on-accent); transform: scale(1.05); }
.nx-hs-dot:hover { transform: scale(1.1); }
.nx-hs-ring { position: absolute; inset: 0; border-radius: 999px; border: 2px solid var(--accent); animation: nxpulse 2s var(--ease) infinite; }
.nx-hs-dot.on .nx-hs-ring { display: none; }
@keyframes nxpulse { 0% { transform: scale(1); opacity: .7; } 100% { transform: scale(2.1); opacity: 0; } }
.nx-hs-card {
  position: absolute; top: 50%; left: calc(100% + 14px); transform: translateY(-50%) scale(.92);
  width: 220px; background: var(--surface); box-shadow: var(--shadow); padding: 14px 16px;
  display: flex; flex-direction: column; gap: 5px; opacity: 0; pointer-events: none;
  transition: opacity .25s var(--ease), transform .25s var(--ease); z-index: 6;
  border-top: 2px solid var(--accent);
}
.nx-hs-card.flip { left: auto; right: calc(100% + 14px); }
.nx-hs-card.on { opacity: 1; transform: translateY(-50%) scale(1); pointer-events: auto; }
.nx-hs-title { font-weight: 700; font-size: 14px; color: var(--ink); }
.nx-hs-body { font-size: 13px; line-height: 1.5; color: var(--ink-soft); }

/* thumbs */
.nx-thumbs { display: flex; gap: 10px; }
.nx-thumb { width: 64px; height: 64px; overflow: hidden; background: var(--bg-deep); border: 1px solid var(--line); opacity: .6; transition: opacity .2s, border-color .2s; }
.nx-thumb img { width: 100%; height: 100%; object-fit: cover; }
.nx-thumb.on { opacity: 1; border-color: var(--accent); }
.nx-thumb:hover { opacity: 1; }

/* copy column */
.nx-prod-idx { display: flex; align-items: baseline; gap: 16px; margin-bottom: 12px; }
.nx-prod-idx .serif { font-size: 30px; color: var(--accent); line-height: 1; }
.nx-prod-name { font-size: clamp(38px, 4vw, 56px); line-height: 1; margin: 0 0 10px; }
.nx-prod-tag { font-size: 19px; color: var(--ink); font-weight: 500; margin: 0 0 26px; max-width: 26ch; }
.nx-pair { display: grid; gap: 20px; margin-bottom: 24px; }
.nx-pair-col { display: flex; flex-direction: column; gap: 6px; padding-left: 16px; border-left: 2px solid var(--line); }
.nx-pair-col.solution { border-left-color: var(--accent); }
.nx-pair-label { display: inline-flex; align-items: center; gap: 7px; font-size: 11.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); }
.nx-pair-col.solution .nx-pair-label { color: var(--accent); }
.nx-pair-col p { margin: 0; font-size: 15.5px; color: var(--ink-soft); line-height: 1.55; }
.nx-specs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.nx-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--ink-soft); background: var(--surface); border: 1px solid var(--line-soft); padding: 6px 12px; border-radius: 999px; }
.nx-chip i { color: var(--accent); font-size: 14px; }

.nx-buy { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.nx-buy-price { font-size: 26px; font-weight: 700; font-family: var(--font-display); }
.nx-inbag { margin-top: 12px; font-size: 13px; font-weight: 600; color: var(--accent); display: inline-flex; align-items: center; gap: 5px; }
.nx-inbag::before { content: '\2713'; }

/* stepper */
.nx-stepper { display: inline-flex; align-items: center; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
.nx-stepper button { width: 38px; height: 44px; display: grid; place-items: center; font-size: 16px; color: var(--ink); transition: background .2s; }
.nx-stepper.light button { height: 50px; }
.nx-stepper button:hover { background: var(--surface); }
.nx-stepper span { min-width: 30px; text-align: center; font-weight: 600; font-size: 15px; }

@media (max-width: 860px) {
  .nx-prod { grid-template-columns: 1fr; gap: 30px; }
  .nx-prod.rev .nx-prod-visual { order: 0; }
}

/* ---------------- Ecosystem ---------------- */
.nx-eco { background: var(--bg-deep); padding: clamp(72px, 10vw, 130px) 0; margin-top: clamp(60px, 9vw, 110px); }
.nx-eco-inner { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(40px, 6vw, 90px); align-items: center; }
.nx-eco-copy .eyebrow { color: var(--accent); }
.nx-eco-copy .h2 { margin: 16px 0 20px; }
.nx-eco-list { list-style: none; padding: 0; margin: 28px 0 0; display: flex; flex-direction: column; gap: 14px; }
.nx-eco-list li { display: flex; align-items: flex-start; gap: 12px; font-size: 16px; color: var(--ink-soft); }
.nx-eco-list i { color: var(--accent); font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.nx-eco-card { background: var(--surface); padding: clamp(24px, 3vw, 38px); box-shadow: var(--shadow); }
.nx-eco-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
.nx-eco-card-head h3 { font-size: 32px; margin: 4px 0 0; }
.nx-eco-save { background: var(--accent); color: var(--on-accent); font-weight: 700; font-size: 13px; padding: 6px 12px; border-radius: 999px; white-space: nowrap; }
.nx-eco-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 26px 0; }
.nx-eco-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.nx-eco-item img { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--bg-deep); transition: transform .25s var(--ease); }
.nx-eco-item:hover img { transform: translateY(-4px); }
.nx-eco-item span { font-size: 12px; font-weight: 600; color: var(--ink-soft); }
.nx-eco-pricing { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding-top: 22px; border-top: 1px solid var(--line); flex-wrap: wrap; }
.nx-eco-price { display: flex; align-items: baseline; gap: 12px; }
.nx-eco-was { font-size: 18px; color: var(--ink-faint); text-decoration: line-through; }
.nx-eco-now { font-size: 40px; line-height: 1; }
@media (max-width: 860px) { .nx-eco-inner { grid-template-columns: 1fr; } }

/* ---------------- Reviews + trust ---------------- */
.nx-reviews { padding: clamp(72px, 10vw, 130px) 0; }
.nx-reviews-head { text-align: center; max-width: 800px; margin: 0 auto clamp(40px, 6vw, 70px); }
.nx-reviews-head .eyebrow { color: var(--accent); }
.nx-reviews-head .h2 { margin-top: 16px; }
.nx-reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.nx-review { background: var(--surface); padding: 26px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 16px; }
.nx-review.feature { grid-column: span 1; }
.nx-review:nth-child(1) { grid-row: span 2; background: var(--ink); color: var(--bg); }
.nx-review:nth-child(1) blockquote { font-size: 24px; font-family: var(--font-display); line-height: 1.3; }
.nx-review:nth-child(1) .nx-review-meta { color: color-mix(in srgb, var(--bg) 60%, transparent); }
.nx-stars { display: flex; gap: 3px; color: var(--accent); font-size: 15px; }
.nx-review blockquote { margin: 0; font-size: 16px; line-height: 1.55; color: inherit; }
.nx-review figcaption { display: flex; flex-direction: column; gap: 2px; margin-top: auto; }
.nx-review-name { font-weight: 700; font-size: 14px; }
.nx-review-meta { font-size: 13px; color: var(--ink-faint); }
@media (max-width: 860px) {
  .nx-reviews-grid { grid-template-columns: 1fr 1fr; }
  .nx-review:nth-child(1) { grid-row: span 1; grid-column: span 2; }
}
@media (max-width: 560px) { .nx-reviews-grid { grid-template-columns: 1fr; } .nx-review:nth-child(1) { grid-column: span 1; } }

.nx-trust { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 44px; padding-top: 44px; border-top: 1px solid var(--line); }
.nx-trust-item { display: flex; align-items: flex-start; gap: 14px; }
.nx-trust-item i { font-size: 28px; color: var(--accent); flex-shrink: 0; }
.nx-trust-title { display: block; font-weight: 700; font-size: 15px; }
.nx-trust-body { display: block; font-size: 13.5px; color: var(--ink-soft); line-height: 1.45; }
@media (max-width: 860px) { .nx-trust { grid-template-columns: 1fr 1fr; gap: 26px; } }

/* ---------------- Footer ---------------- */
.nx-foot { background: var(--ink); color: var(--bg); padding: clamp(56px, 7vw, 90px) 0 30px; }
.nx-foot-grid { display: grid; grid-template-columns: 1.4fr 2fr 1.4fr; gap: 44px; }
.nx-foot-brand .nx-logo-dot { background: var(--accent); }
.nx-foot-brand p { color: color-mix(in srgb, var(--bg) 65%, transparent); margin: 16px 0 22px; max-width: 28ch; font-size: 15px; }
.nx-foot-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.nx-foot-cols > div { display: flex; flex-direction: column; gap: 12px; }
.nx-foot-h { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: color-mix(in srgb, var(--bg) 50%, transparent); font-weight: 700; margin-bottom: 4px; }

  <script>
/* ============================================================
   NEXORA — application (vanilla JS port of the design prototype)
   No build step, no framework: open Nexora.html directly.
   Recreates the React/Babel prototype's markup, styles and
   interactions 1:1 (cart, hotspots, galleries, checkout, theme).
   ============================================================ */
(function () {
  'use strict';

  const { PRODUCTS, BUNDLE, REVIEWS, TRUST } = window.NEXORA_DATA;

  /* ---------------- helpers ---------------- */
  const money = (n) => '$' + n.toFixed(0);
  const prodById = (id) => PRODUCTS.find((p) => p.id === id);

  function h(tag, attrs, ...kids) {
    const e = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (v == null || v === false) continue;
        if (k === 'class') e.className = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
        else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
        else if (v === true) e.setAttribute(k, '');
        else e.setAttribute(k, v);
      }
    }
    for (const kid of kids.flat()) {
      if (kid == null || kid === false) continue;
      e.append(kid.nodeType ? kid : document.createTextNode(kid));
    }
    return e;
  }
  const icon = (cls) => h('i', { class: cls });
  const $ = (sel, root = document) => root.querySelector(sel);

  /* ---------------- cart state ---------------- */
  const cart = {
    items: {},          // id -> qty
    open: false,
    flash: null,
    get lines() { return Object.entries(this.items).map(([id, qty]) => ({ p: prodById(id), qty })); },
    get count() { return this.lines.reduce((s, l) => s + l.qty, 0); },
    get subtotal() { return this.lines.reduce((s, l) => s + l.p.price * l.qty, 0); },
    add(id, qty = 1) { this.items[id] = (this.items[id] || 0) + qty; this.ping(id); changed(); },
    addBundle() { BUNDLE.items.forEach((id) => { this.items[id] = (this.items[id] || 0) + 1; }); this.ping('daily-five'); changed(); },
    setQty(id, qty) { if (qty <= 0) delete this.items[id]; else this.items[id] = qty; changed(); },
    remove(id) { delete this.items[id]; changed(); },
    clear() { this.items = {}; changed(); },
    ping(id) { this.flash = id; setTimeout(() => { if (this.flash === id) { this.flash = null; updateCartUI(); } }, 700); },
    setOpen(v) { this.open = v; onTrayOpenChange(); },
  };

  function changed() { updateCartUI(); }

  /* ============================================================
     HEADER
     ============================================================ */
  const ACCENTS = ['#B5764A', '#C0613B', '#6E7657', '#43382B', '#5C6B7A'];
  let prefDark = false;
  let prefAccent = ACCENTS[0];
  try {
    const saved = JSON.parse(localStorage.getItem('nexora-prefs') || '{}');
    if (typeof saved.dark === 'boolean') prefDark = saved.dark;
    if (typeof saved.accent === 'string') prefAccent = saved.accent;
  } catch (e) { /* ignore */ }

  function applyPrefs() {
    document.documentElement.setAttribute('data-theme', prefDark ? 'dark' : 'light');
    document.documentElement.style.setProperty('--accent', prefAccent);
    try { localStorage.setItem('nexora-prefs', JSON.stringify({ dark: prefDark, accent: prefAccent })); } catch (e) {}
  }

  let cartCountBadge, prefSwitchEl, accentDotEls = [];

  function buildPref() {
    prefSwitchEl = h('button', {
      class: 'nx-switch' + (prefDark ? ' on' : ''), role: 'switch', 'aria-checked': prefDark ? 'true' : 'false',
      'aria-label': 'Dark mode',
      onclick: () => { prefDark = !prefDark; prefSwitchEl.classList.toggle('on', prefDark); prefSwitchEl.setAttribute('aria-checked', prefDark); applyPrefs(); },
    }, icon(''));

    accentDotEls = ACCENTS.map((c) => h('button', {
      class: 'nx-accent-dot' + (c === prefAccent ? ' on' : ''), style: { background: c },
      'aria-label': 'Accent ' + c, title: c,
      onclick: () => { prefAccent = c; accentDotEls.forEach((d, i) => d.classList.toggle('on', ACCENTS[i] === c)); applyPrefs(); },
    }));

    const pop = h('div', { class: 'nx-pref-pop' },
      h('div', { class: 'nx-pref-sect' },
        h('span', { class: 'nx-pref-label' }, 'Theme'),
        h('div', { class: 'nx-pref-row' }, h('span', {}, 'Dark mode'), prefSwitchEl)),

        h('button', { class: 'btn btn-ghost', onclick: () => { cart.addBundle(); cart.setOpen(true); } }, 'Shop the set')),
      h('div', { class: 'nx-hero-meta' },
        h('span', {}, icon('ri-truck-line'), ' Free 2-day shipping'),
        h('span', {}, icon('ri-shield-check-line'), ' 2-year warranty')));

    const visualEl = h('div', { class: 'nx-hero-visual' },
      h('div', { class: 'nx-hero-tiles' }, PRODUCTS.map((p, i) =>
        h('figure', { class: 'nx-hero-tile' + (i === 0 ? ' feature' : '') },
          h('img', { src: p.hero, alt: p.name + ' — ' + p.category, loading: i === 0 ? 'eager' : 'lazy' }),
          h('figcaption', {},
            h('span', { class: 'nx-hero-tile-name serif' }, p.name),
            h('span', { class: 'nx-hero-tile-cat' }, p.category))))),
      h('div', { class: 'nx-hero-badge' },
        h('span', { class: 'serif' }, '5'),
        h('span', { html: 'essentials,<br>one system' })));

    // When the columns stack (mobile), match the tile mosaic's height to the
    // text column so the two halves read as equal blocks. On desktop the grid
    // already stretches both columns, so we clear the inline height.
    const stacked = typeof window.matchMedia === 'function' ? window.matchMedia('(max-width: 900px)') : null;
    const syncHeight = () => {
      if (stacked && stacked.matches) {
        const hh = copyEl.offsetHeight;
        visualEl.style.minHeight = '0';      // defeat the CSS 56vh floor
        visualEl.style.height = hh + 'px';   // match the text column exactly
      } else {
        visualEl.style.height = '';
        visualEl.style.minHeight = '';       // let the grid stretch govern
      }
    };
    if (typeof requestAnimationFrame === 'function') requestAnimationFrame(syncHeight); else syncHeight();
    window.addEventListener('resize', syncHeight);
    window.addEventListener('load', syncHeight);
    if (typeof document !== 'undefined' && document.fonts && document.fonts.ready) document.fonts.ready.then(syncHeight);
    // Keep them locked together through any reflow (font swap, line re-wrap, etc.).
    if (typeof ResizeObserver === 'function') new ResizeObserver(syncHeight).observe(copyEl);

    return h('section', { class: 'nx-hero', id: 'top' },
      h('div', { class: 'nx-hero-grid' }, copyEl, visualEl),
      h('a', { href: '#showcase', class: 'nx-scroll-cue', 'aria-label': 'Scroll to products' }, icon('ri-arrow-down-line'))
    );
  }

  /* ============================================================
     SHOWCASE — product block with hotspots, gallery, quick-buy
     ============================================================ */
  function buildProductBlock(p, index, reversed) {
    const state = { imgIdx: 0, activeSpot: null };

    const stageWrap = h('div', { class: 'nx-stage' });
    const thumbEls = [];

    function renderStage() {
      stageWrap.innerHTML = '';
      const onHero = state.imgIdx === 0;
      stageWrap.append(h('img', { src: p.gallery[state.imgIdx], alt: p.name + ' — ' + p.category, class: 'nx-stage-img' }));
      if (onHero) {
        p.hotspots.forEach((s, i) => stageWrap.append(buildHotspot(s, i)));
        stageWrap.append(h('span', { class: 'nx-stage-hint' }, icon('ri-focus-3-line'), ' Tap to explore'));
      }
    }

    function buildHotspot(spot, i) {
      const flip = spot.x > 55;
      const card = h('div', { class: 'nx-hs-card' + (flip ? ' flip' : '') },
        h('span', { class: 'nx-hs-title' }, spot.title),
        h('span', { class: 'nx-hs-body' }, spot.body));
      const dotIcon = icon(state.activeSpot === i ? 'ri-close-line' : 'ri-add-line');
      const dot = h('button', { class: 'nx-hs-dot' + (state.activeSpot === i ? ' on' : ''), 'aria-label': spot.title,
        onclick: () => { state.activeSpot = state.activeSpot === i ? null : i; renderStage(); } },
        h('span', { class: 'nx-hs-ring' }), dotIcon);
      if (state.activeSpot === i) card.classList.add('on');
      return h('div', { class: 'nx-hs', style: { left: spot.x + '%', top: spot.y + '%' } }, dot, card);
    }

    p.gallery.forEach((g, i) => {
      const t = h('button', { class: 'nx-thumb' + (i === 0 ? ' on' : ''), 'aria-label': 'View image ' + (i + 1),
        onclick: () => { state.imgIdx = i; state.activeSpot = null; thumbEls.forEach((te, j) => te.classList.toggle('on', j === i)); renderStage(); } },
        h('img', { src: g, alt: '' }));
      thumbEls.push(t);
    });

    renderStage();

    const visual = h('div', { class: 'nx-prod-visual' }, stageWrap, h('div', { class: 'nx-thumbs' }, thumbEls));

    /* ---- buy controls (cart-dependent; refreshed by updateCartUI) ---- */
    let qty = 1;
    const qtyLabel = h('span', {}, '1');
    const stepper = h('div', { class: 'nx-stepper light' },
      h('button', { 'aria-label': 'Decrease', onclick: () => { qty = Math.max(1, qty - 1); qtyLabel.textContent = qty; } }, icon('ri-subtract-line')),
      qtyLabel,
      h('button', { 'aria-label': 'Increase', onclick: () => { qty = qty + 1; qtyLabel.textContent = qty; } }, icon('ri-add-line')));

    const buyBtn = h('button', { class: 'btn btn-accent', onclick: () => cart.add(p.id, qty) }, icon('ri-add-line'), 'Quick buy');
    const inbagLine = h('button', { class: 'nx-inbag', onclick: () => cart.setOpen(true) });
    inbagLine.style.display = 'none';

    function refreshBuy() {
      const n = cart.items[p.id];
      buyBtn.innerHTML = '';
      buyBtn.append(icon(n ? 'ri-check-double-line' : 'ri-add-line'), n ? 'Add more' : 'Quick buy');
      if (n) { inbagLine.style.display = ''; inbagLine.textContent = n + ' in bag · view'; }
      else inbagLine.style.display = 'none';
    }
    buyRefreshers.push(refreshBuy);

    const copy = h('div', { class: 'nx-prod-copy' },
      h('div', { class: 'nx-prod-idx' },
        h('span', { class: 'serif' }, String(index + 1).padStart(2, '0')),
        h('span', { class: 'nx-prod-cat eyebrow' }, p.category)),
      h('h3', { class: 'nx-prod-name serif' }, p.name),
      h('p', { class: 'nx-prod-tag' }, p.tagline),
      h('div', { class: 'nx-pair' },
        h('div', { class: 'nx-pair-col' },
          h('span', { class: 'nx-pair-label' }, icon('ri-error-warning-line'), ' The micro-problem'),
          h('p', {}, p.problem)),
        h('div', { class: 'nx-pair-col solution' },
          h('span', { class: 'nx-pair-label' }, icon('ri-lightbulb-flash-line'), ' The smart solution'),
          h('p', {}, p.solution))),
      h('div', { class: 'nx-specs' }, p.specs.map((s) => h('span', { class: 'nx-chip' }, icon('ri-check-line'), s))),
      h('div', { class: 'nx-buy' }, h('span', { class: 'nx-buy-price' }, money(p.price)), stepper, buyBtn),
      inbagLine
    );

    return h('article', { class: 'nx-prod' + (reversed ? ' rev' : ''), 'data-screen-label': p.name, id: 'product-' + p.id }, visual, copy);
  }

  /* ============================================================
     CART TRAY + CHECKOUT
     ============================================================ */
  let scrimEl, trayEl, trayHeadTitle, trayStage = 'bag';

  function buildTray() {
    scrimEl = h('div', { class: 'nx-scrim', onclick: () => cart.setOpen(false) });
    trayHeadTitle = h('span', { class: 'serif', style: { fontSize: '26px' } }, 'Your bag');
    trayEl = h('aside', { class: 'nx-tray', 'aria-hidden': 'true', 'aria-label': 'Shopping bag' },
      h('header', { class: 'nx-tray-head' }, trayHeadTitle,
        h('button', { class: 'nx-x', 'aria-label': 'Close', onclick: () => cart.setOpen(false) }, icon('ri-close-line'))));

    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') cart.setOpen(false); });
    return h('div', {}, scrimEl, trayEl);
  }

  function setStage(s) { trayStage = s; renderTrayBody(); }

  function renderTrayBody() {
    // remove everything after the header
    while (trayEl.children.length > 1) trayEl.lastChild.remove();
    trayHeadTitle.textContent = trayStage === 'bag' ? 'Your bag' : trayStage === 'checkout' ? 'Checkout' : 'Order placed';
    if (trayStage === 'bag') renderBagStage();
    else if (trayStage === 'checkout') renderCheckoutStage();
    else renderDoneStage();
  }

  function renderBagStage() {
    const shipping = 0;
    const total = cart.subtotal + shipping;
    if (cart.count === 0) {
      trayEl.append(h('div', { class: 'nx-tray-body nx-empty' },
        icon('ri-shopping-bag-3-line'),
        h('p', {}, 'Your bag is empty.'),
        h('span', {}, 'Add one of the five essentials to begin.')));
      return;
    }
    const body = h('div', { class: 'nx-tray-body' });
    cart.lines.forEach(({ p, qty }) => {
      body.append(h('div', { class: 'nx-line' },
        h('img', { class: 'nx-line-img', src: p.hero, alt: p.name }),
        h('div', { class: 'nx-line-mid' },
          h('div', { class: 'nx-line-top' },
            h('span', { class: 'nx-line-name' }, p.name),
            h('button', { class: 'nx-line-rm', 'aria-label': 'Remove ' + p.name, onclick: () => cart.remove(p.id) }, icon('ri-delete-bin-line'))),
          h('span', { class: 'nx-line-cat' }, p.category),
          h('div', { class: 'nx-line-bottom' },
            h('div', { class: 'nx-stepper' },
              h('button', { 'aria-label': 'Decrease', onclick: () => cart.setQty(p.id, qty - 1) }, icon('ri-subtract-line')),
              h('span', {}, String(qty)),
              h('button', { 'aria-label': 'Increase', onclick: () => cart.setQty(p.id, qty + 1) }, icon('ri-add-line'))),
            h('span', { class: 'nx-line-price' }, money(p.price * qty))))));
    });
    // bundle nudge
    const inCart = Object.keys(cart.items).length;
    if (inCart < 5) {
      body.append(h('button', { class: 'nx-nudge', onclick: () => cart.addBundle() },
        h('div', {},
          h('span', { class: 'nx-nudge-title' }, 'Complete the Daily Five'),
          h('span', { class: 'nx-nudge-sub' }, 'Add the ' + (5 - inCart) + ' missing essential' + (5 - inCart > 1 ? 's' : '') + ' — save $' + BUNDLE.saving + '.')),
        icon('ri-add-circle-line')));
    }
    trayEl.append(body);

    trayEl.append(h('footer', { class: 'nx-tray-foot' },
      h('div', { class: 'nx-foot-row' }, h('span', {}, 'Subtotal'), h('span', {}, money(cart.subtotal))),
      h('div', { class: 'nx-foot-row muted' }, h('span', {}, 'Shipping'), h('span', {}, 'Free')),
      h('div', { class: 'nx-foot-row total' }, h('span', {}, 'Total'), h('span', {}, money(total))),
      h('button', { class: 'btn btn-accent', style: { width: '100%', justifyContent: 'center', marginTop: '14px' }, onclick: () => setStage('checkout') },
        'Checkout · ' + money(total)),
      h('button', { class: 'nx-foot-link', onclick: () => cart.setOpen(false) }, 'Continue shopping')));
  }

  function renderCheckoutStage() {
    const total = cart.subtotal;
    const mk = (label, attrs) => {
      const input = h('input', attrs);
      return { group: h('div', { class: 'nx-field-group' }, h('label', {}, label), input), input };
    };
    const email = mk('Email', { type: 'email', placeholder: 'you@email.com' });
    const name = mk('Full name', { placeholder: 'Alex Morgan' });
    const address = mk('Address', { placeholder: '123 Maple Street' });
    const city = mk('City', { placeholder: 'Portland' });
    const zipInput = h('input', { placeholder: '97201' });
    const zip = { group: h('div', { class: 'nx-field-group', style: { maxWidth: '120px' } }, h('label', {}, 'ZIP'), zipInput), input: zipInput };
    const card = h('input', { placeholder: '4242 4242 4242 4242', inputmode: 'numeric' });

    const form = h('form', { class: 'nx-tray-body nx-form' },
      h('button', { type: 'button', class: 'nx-back', onclick: () => setStage('bag') }, icon('ri-arrow-left-line'), ' Back to bag'),
      email.group, name.group, address.group,
      h('div', { class: 'nx-field-row' }, city.group, zip.group),
      h('div', { class: 'nx-field-group' },
        h('label', {}, 'Card number'),
        h('div', { class: 'nx-card-input' }, icon('ri-bank-card-line'), card),
        h('span', { class: 'nx-secure' }, icon('ri-lock-2-line'), ' Encrypted & secure · demo checkout')),
      h('footer', { class: 'nx-form-foot' },
        h('div', { class: 'nx-foot-row total' }, h('span', {}, 'Total'), h('span', {}, money(total))),
        h('button', { type: 'submit', class: 'btn btn-accent', style: { width: '100%', justifyContent: 'center', marginTop: '8px' } },
          'Place order · ' + money(total)))
    );

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const checks = [
        [email.input, !email.input.value.includes('@')],
        [name.input, !name.input.value],
        [address.input, !address.input.value],
        [city.input, !city.input.value],
        [zip.input, zip.input.value.length < 4],
        [card, card.value.replace(/\s/g, '').length < 12],
      ];
      let ok = true;
      checks.forEach(([el, bad]) => { el.classList.toggle('bad', bad); if (bad) ok = false; });
      if (ok) setStage('done');
    });

    trayEl.append(form);
  }

  function renderDoneStage() {
    const items = h('div', { class: 'nx-done-items' }, cart.lines.map(({ p, qty }) =>
      h('div', { class: 'nx-done-item' }, h('img', { src: p.hero, alt: '' }), h('span', {}, p.name + (qty > 1 ? ' ×' + qty : '')))));
    trayEl.append(h('div', { class: 'nx-tray-body nx-done' },
      h('div', { class: 'nx-done-mark' }, icon('ri-check-line')),
      h('h3', { class: 'serif' }, 'You’re all set.'),
      h('p', {}, 'Your essentials are on the way — free 2-day shipping, with tracking sent to your inbox.'),
      items,
      h('button', { class: 'btn btn-primary', style: { width: '100%', justifyContent: 'center' }, onclick: () => { cart.clear(); cart.setOpen(false); } }, 'Done')));
  }

  function onTrayOpenChange() {
    scrimEl.classList.toggle('on', cart.open);
    trayEl.classList.toggle('on', cart.open);
    trayEl.setAttribute('aria-hidden', cart.open ? 'false' : 'true');
    document.body.style.overflow = cart.open ? 'hidden' : '';
    if (cart.open) renderTrayBody();
    else setTimeout(() => { trayStage = 'bag'; }, 350);
    updateCartUI();
  }

  /* ============================================================
     CART-DEPENDENT UI REFRESH
     ============================================================ */
  function updateCartUI() {
    const count = cart.count;
    // header badge
    cartCountBadge.textContent = String(count);
    cartCountBadge.style.display = count > 0 ? '' : 'none';
    // floating bar
    PRODUCTS.forEach((p) => {
      const d = barDotEls[p.id];
      const inCart = !!cart.items[p.id];
      d.classList.toggle('on', inCart);
      d.classList.toggle('flash', cart.flash === p.id);
      d.title = inCart ? p.name + ' — in bag' : 'Add ' + p.name;
      d.setAttribute('aria-label', inCart ? p.name + ' in bag' : 'Add ' + p.name);
      let check = d.querySelector('.nx-dot-check');
      if (inCart && !check) d.append(h('span', { class: 'nx-dot-check' }, icon('ri-check-line')));
      else if (!inCart && check) check.remove();
    });
    barProgress.textContent = count > 0 ? Object.keys(cart.items).length + ' of 5 essentials' : 'Tap to add an essential';
    barSubtotal.textContent = money(cart.subtotal);
    barBagBtn.innerHTML = '';
    barBagBtn.append(icon('ri-shopping-bag-3-line'), ' Bag · ' + count);
    barBagBtn.disabled = count === 0;
    // per-product buy rows
    buyRefreshers.forEach((fn) => fn());
    // open tray bag stage live-updates
    if (cart.open && trayStage === 'bag') renderTrayBody();
  }

  /* ============================================================
     MOUNT
     ============================================================ */
  applyPrefs();
  const root = document.getElementById('root');
  root.append(buildHeader());
  const main = h('main', {}, buildHero(), buildShowcase(), buildEcosystem(), buildReviews());
  root.append(main, buildFooter(), buildFloatingBar(), buildTray());
  updateCartUI();
})();

  </script>
</body>
</html>
